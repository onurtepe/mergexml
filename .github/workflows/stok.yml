name: Günlük Stok Birleştirme

on:
  schedule:
    - cron: '0 3 * * *'   # Her gün 06:00 Türkiye saati (UTC+3 = UTC 03:00)
  workflow_dispatch:        # Elle de tetiklenebilir (GitHub arayüzünden "Run workflow" butonu)

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # output/ klasörüne commit atabilmek için

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge scriptini çalıştır
        run: node merge.js

      - name: Birleşik XML'i commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "stok güncellendi $(date +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
